body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
}

/* Fondo */
.fondo {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("./foto.jpg") center no-repeat;
    background-size: contain;
    background-color: black;
    z-index: -2;
}

/* Oscuro */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.contenido {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

h1 { font-size: 26px; }

#contador { font-size: 18px; }

.mensaje {
    margin-top: 20px;
    font-size: 16px;
}

/* Flores */
.flor {
    position: absolute;
    top: -50px;
    font-size: 20px;
    animation: caer linear infinite;
}

@keyframes caer {
    to { transform: translateY(110vh); }
}

/* Polaroid */
.polaroid {
    position: absolute;
    width: 100px;
    background: white;
    padding: 6px;
    border-radius: 5px;
}

.pol1 { left: 5%; bottom: 10%; }
.pol2 { right: 5%; bottom: 10%; }

.polaroid img {
    width: 100%;
}

/* Botones */
.boton {
    margin-top: 15px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: gold;
}

</style>
</head>

<body>

<div class="fondo"></div>
<div class="overlay"></div>

<div class="contenido">
    <h1>🌼 Para ti 💛</h1>
    <div id="contador"></div>

    <div class="mensaje">
       tiamo mucho chaparrita bella 💛
    </div>

    <button class="boton" onclick="activarMusica()">🎵 Activar música</button>
</div>

<!-- Fotos -->
<div class="polaroid pol1">
    <img src="./foto1.jpg">
</div>

<div class="polaroid pol2">
    <img src="./foto2.jpg">
</div>

<!-- Música -->
<audio id="musica" loop>
    <source src="./musica.mp3" type="audio/mpeg">
</audio>

<script>
// contador
const fechaInicio = new Date(2024, 8, 8);

function actualizarContador() {
    const ahora = new Date();
    const diff = ahora - fechaInicio;

    const dias = Math.floor(diff / (1000*60*60*24));
    const horas = Math.floor((diff / (1000*60*60)) % 24);

    document.getElementById("contador").innerHTML =
        `${dias} días 💛 ${horas}h`;
}

actualizarContador();
setInterval(actualizarContador, 1000);

// flores
function crearFlor() {
    const flor = document.createElement("div");
    flor.className = "flor";
    flor.innerHTML = "🌼";

    flor.style.left = Math.random() * window.innerWidth + "px";
    flor.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(flor);
    setTimeout(() => flor.remove(), 8000);
}

setInterval(crearFlor, 300);

// 🎵 activar música (clave para celular)
function activarMusica() {
    const audio = document.getElementById("musica");
    audio.play();
}
</script>

</body>
